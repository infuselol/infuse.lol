<style>
.logo{font-size:7rem;font-weight:900;letter-spacing:-0.02em;margin-bottom:1rem;}
.infuse{color:#ff3333;text-shadow:0 0 10px rgba(255,51,51,0.4),0 0 30px rgba(255,51,51,0.15);transition:all .3s;cursor:pointer;display:inline-block;}
.infuse:hover{transform:translateY(-8px) scale(1.08);text-shadow:0 0 20px rgba(255,51,51,0.6),0 0 40px rgba(255,51,51,0.3);}
.lol{color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.2);transition:all .3s;cursor:pointer;display:inline-block;}
.lol:hover{transform:translateY(-8px) scale(1.08);}
.clock-wrapper{margin-bottom:2rem;display:flex;flex-direction:column;align-items:center;}
.clock-time{font-family:'JetBrains Mono',monospace;font-size:3.2rem;font-weight:700;color:#fff;letter-spacing:0.04em;background:linear-gradient(180deg,#fff 0%,#aaa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,51,51,0.2));}
.clock-time .clock-colon{color:#ff3333;-webkit-text-fill-color:#ff3333;opacity:.6;}
.clock-time .clock-seconds{-webkit-text-fill-color:#ff3333;font-size:2.2rem;opacity:.7;}
.clock-time .clock-ampm{-webkit-text-fill-color:#ff3333;font-size:1.1rem;margin-left:.4rem;font-weight:500;opacity:.8;}
.clock-date{font-size:.82rem;color:#444;margin-top:.4rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;}
.clock-label{font-size:.65rem;color:#2a2a2a;margin-top:.2rem;letter-spacing:.2em;text-transform:uppercase;}
.socials-box{background:rgba(255,255,255,.02);border:1.5px solid rgba(255,51,51,.15);border-radius:16px;width:340px;height:100px;overflow:hidden;box-shadow:0 0 40px rgba(255,51,51,.06);backdrop-filter:blur(10px);margin-top:1.5rem;scrollbar-width:none;}
.socials-box::-webkit-scrollbar{display:none;}
.socials-scroll{display:flex;flex-direction:column;animation:scroll 10s linear infinite;pointer-events:none;}
.social-item{pointer-events:auto;}
.socials-scroll.paused{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateY(0)}100%{transform:translateY(-300px)}}
.social-item{display:flex;align-items:center;justify-content:center;gap:.75rem;padding:1.6rem 2rem;min-height:100px;transition:all .3s;cursor:pointer;}
.social-item:hover{background:rgba(255,51,51,.08);}
.social-icon{width:22px;height:22px;flex-shrink:0;}
.social-text{color:#999;font-size:.92rem;font-weight:500;}
@media(max-width:768px){.logo{font-size:3.5rem;}.clock-time{font-size:2rem;}.clock-time .clock-seconds{font-size:1.2rem;}.clock-time .clock-ampm{font-size:.9rem;}.socials-box{width:90vw;max-width:340px;}}
@media(max-width:400px){.logo{font-size:2.8rem;}.clock-time{font-size:1.6rem;}.clock-time .clock-seconds{font-size:1rem;}}
</style>
</head>

<div class="copy-notification" id="copyNotification">Copied to clipboard!</div>

<script>
// Clock
function updateClock(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  let h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  const ampm=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('clockTime').innerHTML=`${h}<span class="clock-colon">:</span>${String(m).padStart(2,'0')}<span class="clock-seconds">:${String(s).padStart(2,'0')}</span><span class="clock-ampm">${ampm}</span>`;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clockDate').textContent=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}
updateClock();setInterval(updateClock,1000);

// Socials scroll + copy
const scroll=document.getElementById('socialsScroll');
document.querySelectorAll('.social-item').forEach(item=>scroll.appendChild(item.cloneNode(true)));
document.querySelectorAll('.social-item').forEach(item=>{
  item.addEventListener('pointerdown',e=>{
    e.preventDefault();e.stopPropagation();
    const text=item.querySelector('.social-text').textContent;
    const copy=()=>{const n=document.getElementById('copyNotification');n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2000);};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(copy);}
    else{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');copy();}catch(e){}document.body.removeChild(ta);}
  });
});
</script>
