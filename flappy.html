<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
.page-content{flex-direction:column;align-items:center;justify-content:flex-start;padding-top:1rem;gap:0;}
.flappy-wrapper{position:relative;width:100%;max-width:400px;}
#flappyCanvas{width:100%;border-radius:16px;border:1.5px solid rgba(255,51,51,.15);box-shadow:0 0 40px rgba(255,51,51,.08);display:block;background:#0a0a0a;cursor:pointer;touch-action:none;}
.flappy-best{margin-top:.8rem;font-size:.8rem;color:#333;font-weight:600;text-transform:uppercase;letter-spacing:.1em;}
/* Name input */
.name-input-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:3000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
.name-input-overlay.show{opacity:1;pointer-events:auto;}
.name-input-card{background:radial-gradient(ellipse at center,rgba(255,51,51,.1) 0%,rgba(10,10,10,.98) 70%);border:2px solid rgba(255,51,51,.3);border-radius:20px;padding:2.5rem;text-align:center;max-width:380px;width:90%;transform:scale(.8);transition:transform .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 60px rgba(255,51,51,.2);}
.name-input-overlay.show .name-input-card{transform:scale(1);}
.name-input-card h3{color:#ff3333;font-size:1.4rem;font-weight:900;margin-bottom:.3rem;}
.ni-score{font-family:'JetBrains Mono',monospace;font-size:2.5rem;font-weight:900;color:#fff;margin:.5rem 0;}
.ni-sub{color:#555;font-size:.8rem;margin-bottom:1.2rem;}
.name-input-card input{width:100%;padding:.7rem 1rem;border-radius:10px;border:1.5px solid rgba(255,51,51,.3);background:rgba(255,255,255,.04);color:#fff;font-size:1rem;font-weight:600;font-family:'Inter',sans-serif;text-align:center;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.name-input-card input:focus{border-color:#ff3333;box-shadow:0 0 20px rgba(255,51,51,.2);}
.name-input-card input::placeholder{color:#333;}
.ni-buttons{display:flex;gap:.5rem;margin-top:1rem;}
.ni-submit{flex:1;background:#ff3333;color:#fff;border:none;border-radius:10px;padding:.65rem;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.ni-submit:hover{background:#e02020;}
.ni-submit:disabled{background:#333;color:#555;cursor:default;}
.ni-skip{flex:.6;background:none;border:1.5px solid #222;color:#555;border-radius:10px;padding:.65rem;font-size:.85rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.ni-skip:hover{border-color:#444;color:#888;}
/* Leaderboard */
.leaderboard-wrapper{width:100%;max-width:400px;margin-top:1.2rem;}
.leaderboard-box{background:rgba(255,255,255,.015);border:1.5px solid rgba(255,51,51,.15);border-radius:14px;padding:1rem;text-align:left;}
.leaderboard-title{font-size:.85rem;font-weight:800;color:#ff3333;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.7rem;text-align:center;}
.lb-row{display:flex;align-items:center;gap:.6rem;padding:.4rem .6rem;border-radius:8px;margin-bottom:.25rem;font-size:.8rem;transition:background .2s;}
.lb-row:nth-child(2){background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.15);}
.lb-row:nth-child(3){background:rgba(192,192,192,.06);border:1px solid rgba(192,192,192,.1);}
.lb-row:nth-child(4){background:rgba(205,127,50,.06);border:1px solid rgba(205,127,50,.1);}
.lb-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;flex-shrink:0;}
.lb-rank.gold{background:rgba(255,215,0,.2);color:#ffd700;}
.lb-rank.silver{background:rgba(192,192,192,.2);color:#c0c0c0;}
.lb-rank.bronze{background:rgba(205,127,50,.2);color:#cd7f32;}
.lb-rank.normal{background:rgba(255,255,255,.05);color:#555;}
.lb-name{flex:1;color:#ccc;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-score{color:#ff3333;font-weight:900;font-family:'JetBrains Mono',monospace;font-size:.85rem;}
.lb-empty{color:#333;font-size:.75rem;text-align:center;padding:.8rem;font-style:italic;}
.lb-loading{color:#555;font-size:.75rem;text-align:center;padding:.8rem;}
.lb-new{animation:lbFlash 1s ease infinite alternate;}
@keyframes lbFlash{0%{background:rgba(255,51,51,.05)}100%{background:rgba(255,51,51,.15)}}
@media(max-width:768px){.flappy-wrapper{max-width:100%;}#flappyCanvas{border-radius:12px;}}
</style>
</head>
<body>

<div class="page-content">
  <h2 class="page-subtitle">Flappy Bird</h2>
  <div class="flappy-wrapper">
    <canvas id="flappyCanvas" width="400" height="600"></canvas>
  </div>

<script>
const SUPABASE_URL='https://uguiffclchydslwtadjh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVndWlmZmNsY2h5ZHNsd3RhZGpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNjI2MTksImV4cCI6MjA4NzczODYxOX0.S9wvKy1I2gjLSXsFs4_3PuYFh4AJexYoc3DjynOGFd4';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const BLOCKED_WORDS=['fuck','shit','ass','bitch','dick','cock','pussy','cunt','fag','faggot','nigger','nigga','nig','retard','retarded','whore','slut','bastard','damn','penis','vagina','tits','boob','boobs','titties','anus','dildo','porn','hentai','cum','jizz','wank','twat','prick','motherfucker','nazi','hitler','rape','molest','pedo','pedophile','sex','horny','erect','blowjob','handjob','rimjob','nlgger','diddy','heatler','ballsack','anal','oral','orgasm','ejaculate','masturbat','fetish','bondage','bdsm','thot','simp','incel','chink','spic','wetback','beaner','kike','gook','coon','cracker','tranny','dyke','homo','lesbo','queer'];
const LEET_MAP={'0':'o','1':'i','3':'e','4':'a','5':'s','7':'t','@':'a','$':'s','!':'i'};
function cleanLeet(s){let r='';for(const c of s)r+=LEET_MAP[c.toLowerCase()]||c.toLowerCase();return r;}
function isInappropriate(n){if(!n||!n.trim())return true;const l=n.toLowerCase().replace(/[^a-z0-9@$!]/g,'');const lc=cleanLeet(l);for(const w of BLOCKED_WORDS){if(l.includes(w)||lc.includes(w))return true;}if(/^(.)\1+$/.test(n.trim()))return true;if(n.trim().length<2)return true;return false;}

const canvas=document.getElementById('flappyCanvas');
const ctx=canvas.getContext('2d');
const W=400,H=600,PIPE_W=55,GAP=200,BIRD_SIZE=26,PIPE_INTERVAL=150;
let PIPE_SPEED=4.1;
const TARGET_FPS=60,TARGET_FRAME_TIME=1000/TARGET_FPS;
let lastTime=0,accumulator=0;
const GRAVITY=0.35,FLAP=-8;
let bird,pipes,frameCount,gameScore,gameState,bestScore=0,deathHandled=false;
const FLAPPY_BEST_KEY='infuse_flappy_best';
try{bestScore=parseInt(localStorage.getItem(FLAPPY_BEST_KEY))||0;}catch(e){}
document.getElementById('flappyBest').textContent='Best: '+bestScore;

let leaderboardCache=[],lastHighlightName=null;

async function loadSupabaseLeaderboard(){
  const w=document.getElementById('leaderboardWrapper');
  w.innerHTML=`<div class="leaderboard-box"><div class="leaderboard-title">🏆 Global Leaderboard</div><div class="lb-loading">Loading...</div></div>`;
  try{
    const{data,error}=await sb.from('leaderboard').select('*').order('score',{ascending:false}).limit(10);
    if(error)throw error;leaderboardCache=data||[];renderLeaderboard();
  }catch(e){w.innerHTML=`<div class="leaderboard-box"><div class="leaderboard-title">🏆 Global Leaderboard</div><div class="lb-empty">Could not load leaderboard</div></div>`;}
}

async function submitToSupabase(name,score){
  try{const{error}=await sb.from('leaderboard').insert([{player_name:name,score}]);if(error)throw error;await loadSupabaseLeaderboard();lastHighlightName=name;renderLeaderboard();}catch(e){}
}

function isTopTen(score){if(score<=0)return false;if(leaderboardCache.length<10)return true;return score>leaderboardCache[leaderboardCache.length-1].score;}

function escHtml(t){const d=document.createElement('div');d.appendChild(document.createTextNode(t));return d.innerHTML;}

function renderLeaderboard(){
  const w=document.getElementById('leaderboardWrapper');
  if(!leaderboardCache.length){w.innerHTML=`<div class="leaderboard-box"><div class="leaderboard-title">🏆 Global Leaderboard</div><div class="lb-empty">No scores yet. Be the first!</div></div>`;return;}
  let rows='';leaderboardCache.forEach((e,i)=>{
    const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'normal';
    const rt=i===0?'👑':i===1?'🥈':i===2?'🥉':(i+1);
    const isNew=lastHighlightName&&e.player_name===lastHighlightName;
    rows+=`<div class="lb-row ${isNew?'lb-new':''}"><span class="lb-rank ${rc}">${rt}</span><span class="lb-name">${escHtml(e.player_name)}</span><span class="lb-score">${e.score.toLocaleString()}</span></div>`;
  });
  w.innerHTML=`<div class="leaderboard-box"><div class="leaderboard-title">🏆 Global Leaderboard</div>${rows}</div>`;
  if(lastHighlightName)setTimeout(()=>{lastHighlightName=null;renderLeaderboard();},5000);
}

let pendingScore=0;
const nameOverlay=document.getElementById('nameInputOverlay');
const niName=document.getElementById('niName');

function showNameInput(score){pendingScore=score;document.getElementById('niScore').textContent=score;niName.value='';nameOverlay.classList.add('show');setTimeout(()=>niName.focus(),500);}
function hideNameInput(){nameOverlay.classList.remove('show');niName.blur();}

function trySubmitName(){
  const name=niName.value.trim();if(!name)return;
  if(isInappropriate(name)){niName.style.borderColor='#f00';niName.style.boxShadow='0 0 20px rgba(255,0,0,0.3)';niName.value='';niName.placeholder='Inappropriate name!';setTimeout(()=>{niName.style.borderColor='rgba(255,51,51,0.3)';niName.style.boxShadow='none';niName.placeholder='Your name...';},2000);return;}
  hideNameInput();submitToSupabase(name,pendingScore);pendingScore=0;
}
document.getElementById('niSubmit').addEventListener('click',()=>{if(nameOverlay.classList.contains('show'))trySubmitName();});
document.getElementById('niSkip').addEventListener('click',()=>{if(nameOverlay.classList.contains('show')){hideNameInput();submitToSupabase('Anonymous',pendingScore);pendingScore=0;}});
niName.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Enter'){e.preventDefault();trySubmitName();}});

function resetGame(){bird={x:80,y:H/3,vy:0,angle:0};pipes=[];frameCount=0;gameScore=0;gameState='waiting';PIPE_SPEED=4.1;lastTime=0;accumulator=0;}

function drawDemonDuck(x,y,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.ellipse(0,0,BIRD_SIZE,BIRD_SIZE*.85,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e6b800';ctx.beginPath();ctx.ellipse(0,6,BIRD_SIZE*.7,BIRD_SIZE*.5,0,0,Math.PI);ctx.fill();
  ctx.fillStyle='#ff0000';ctx.beginPath();ctx.ellipse(10,-8,6,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(12,-8,3,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff3333';ctx.shadowColor='#f00';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(12,-9,1.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#ff6600';ctx.beginPath();ctx.moveTo(BIRD_SIZE-2,-2);ctx.lineTo(BIRD_SIZE+14,2);ctx.lineTo(BIRD_SIZE-2,6);ctx.closePath();ctx.fill();
  ctx.fillStyle='#cc0000';ctx.beginPath();ctx.moveTo(-6,-BIRD_SIZE+4);ctx.lineTo(-14,-BIRD_SIZE-14);ctx.lineTo(2,-BIRD_SIZE+6);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(8,-BIRD_SIZE+2);ctx.lineTo(4,-BIRD_SIZE-16);ctx.lineTo(16,-BIRD_SIZE+4);ctx.closePath();ctx.fill();
  ctx.fillStyle='#e6a800';ctx.beginPath();ctx.ellipse(-8,2,14,8,-.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#cc0000';ctx.beginPath();ctx.moveTo(-BIRD_SIZE+4,0);ctx.quadraticCurveTo(-BIRD_SIZE-20,-10,-BIRD_SIZE-8,-20);ctx.lineTo(-BIRD_SIZE-4,-14);ctx.quadraticCurveTo(-BIRD_SIZE-12,-4,-BIRD_SIZE+4,0);ctx.fill();
  ctx.restore();
}

function drawPipe(p){
  const g1=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);g1.addColorStop(0,'#cc1111');g1.addColorStop(.5,'#ff3333');g1.addColorStop(1,'#aa0000');
  ctx.fillStyle=g1;ctx.fillRect(p.x,0,PIPE_W,p.top);
  ctx.fillStyle='#ff4444';ctx.fillRect(p.x-4,p.top-20,PIPE_W+8,20);ctx.strokeStyle='#880000';ctx.lineWidth=1;ctx.strokeRect(p.x-4,p.top-20,PIPE_W+8,20);
  const g2=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);g2.addColorStop(0,'#cc1111');g2.addColorStop(.5,'#ff3333');g2.addColorStop(1,'#aa0000');
  ctx.fillStyle=g2;ctx.fillRect(p.x,p.top+GAP,PIPE_W,H-p.top-GAP);
  ctx.fillStyle='#ff4444';ctx.fillRect(p.x-4,p.top+GAP,PIPE_W+8,20);ctx.strokeStyle='#880000';ctx.lineWidth=1;ctx.strokeRect(p.x-4,p.top+GAP,PIPE_W+8,20);
}

function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0a0a0a');g.addColorStop(.7,'#111');g.addColorStop(1,'#1a0a0a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,51,51,0.15)';for(let i=0;i<30;i++){const sx=(i*137.5+frameCount*.1)%W,sy=(i*97.3)%H;ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#1a0505';ctx.fillRect(0,H-30,W,30);ctx.fillStyle='#2a0a0a';ctx.fillRect(0,H-30,W,3);
}

function drawScore(){ctx.fillStyle='#fff';ctx.font='900 48px Inter,sans-serif';ctx.textAlign='center';ctx.shadowColor='rgba(255,51,51,0.5)';ctx.shadowBlur=20;ctx.fillText(gameScore,W/2,70);ctx.shadowBlur=0;}

function drawSpeedIndicator(){
  const sp=Math.min(1,(PIPE_SPEED-4.1)/1.8);if(sp<=0)return;
  ctx.fillStyle=`rgba(255,51,51,${.3+sp*.4})`;ctx.font='600 12px Inter,sans-serif';ctx.textAlign='right';ctx.fillText('SPEED: '+PIPE_SPEED.toFixed(1)+'x',W-15,25);
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(W-80,30,65,4);
  ctx.fillStyle=`rgba(255,${Math.round(51+sp*100)},51,0.6)`;ctx.fillRect(W-80,30,65*sp,4);
}

function drawStartScreen(){
  drawBg();const by=H/2-30+Math.sin(Date.now()*.003)*10;drawDemonDuck(W/2,by,0);
  ctx.fillStyle='#ff3333';ctx.font='900 28px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('FLAPPY BIRD',W/2,H/2+50);
  ctx.fillStyle='#555';ctx.font='500 14px Inter,sans-serif';ctx.fillText('Tap or press Space to start',W/2,H/2+80);
  ctx.fillStyle='#333';ctx.font='500 11px Inter,sans-serif';ctx.fillText('Speed increases every 5 points!',W/2,H/2+105);
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ff3333';ctx.font='900 36px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-40);
  ctx.fillStyle='#fff';ctx.font='900 56px JetBrains Mono,monospace';ctx.fillText(gameScore,W/2,H/2+30);
  ctx.fillStyle='#555';ctx.font='500 14px Inter,sans-serif';ctx.fillText('Tap or Space to retry',W/2,H/2+70);
}

function collides(){
  if(bird.y-BIRD_SIZE<0||bird.y+BIRD_SIZE>H-30)return true;
  for(const p of pipes){if(bird.x+BIRD_SIZE>p.x&&bird.x-BIRD_SIZE<p.x+PIPE_W){if(bird.y-BIRD_SIZE<p.top||bird.y+BIRD_SIZE>p.top+GAP)return true;}}
  return false;
}

function fixedUpdate(){
  if(gameState!=='playing')return;
  bird.vy+=GRAVITY;bird.y+=bird.vy;bird.angle=Math.max(-.5,Math.min(bird.vy*.04,1.2));
  frameCount++;
  if(frameCount%PIPE_INTERVAL===0){const t=50+Math.random()*(H-GAP-100);pipes.push({x:W,top:t,scored:false});PIPE_SPEED=4.1+Math.floor(gameScore/5)*.15;}
  for(let i=pipes.length-1;i>=0;i--){pipes[i].x-=PIPE_SPEED;if(!pipes[i].scored&&pipes[i].x+PIPE_W<bird.x){pipes[i].scored=true;gameScore++;}if(pipes[i].x<-PIPE_W)pipes.splice(i,1);}
  if(collides()){gameState='dead';deathHandled=false;if(gameScore>bestScore){bestScore=gameScore;localStorage.setItem(FLAPPY_BEST_KEY,bestScore);document.getElementById('flappyBest').textContent='Best: '+bestScore;}}
}

function draw(){
  drawBg();pipes.forEach(drawPipe);drawDemonDuck(bird.x,bird.y,bird.angle);drawScore();drawSpeedIndicator();
  if(gameState==='dead'){drawGameOver();if(!deathHandled){deathHandled=true;setTimeout(()=>{if(gameScore>0&&isTopTen(gameScore))showNameInput(gameScore);else loadSupabaseLeaderboard();},1000);}}
}

function loop(ts){
  if(!lastTime)lastTime=ts;let delta=ts-lastTime;lastTime=ts;if(delta>200)delta=TARGET_FRAME_TIME;
  if(gameState==='waiting'){drawStartScreen();}
  else{accumulator+=delta;let steps=0;while(accumulator>=TARGET_FRAME_TIME&&steps<5){fixedUpdate();accumulator-=TARGET_FRAME_TIME;steps++;}draw();}
  requestAnimationFrame(loop);
}

function flap(){
  if(nameOverlay.classList.contains('show'))return;
  if(gameState==='waiting'){gameState='playing';bird.vy=FLAP;}
  else if(gameState==='playing'){bird.vy=FLAP;}
  else if(gameState==='dead'){resetGame();gameState='playing';bird.vy=FLAP;}
}

function resizeCanvas(){const mw=canvas.parentElement.clientWidth;canvas.style.width=mw+'px';canvas.style.height=(mw*H/W)+'px';}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

canvas.addEventListener('click',e=>{e.preventDefault();flap();});
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
canvas.addEventListener('touchend',e=>e.preventDefault(),{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'){if(document.activeElement===niName)return;e.preventDefault();flap();}});

loadSupabaseLeaderboard();
